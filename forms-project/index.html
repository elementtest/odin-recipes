<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML FORM</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="wrapper">
      <div class="left">
        <div class="banner">
          <div class="logo-container">
            <img class="logo" src="img/odin.png" alt="" />
          </div>
          <div class="h1-container">
            <h1>ODIN</h1>
          </div>
        </div>
        <div class="credit">
          <p>
            Photo by
            <a href="https://unsplash.com/@haliewestphoto">Hallie West </a>on
            <a
              href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
              >Unsplash</a
            >
          </p>
        </div>
      </div>
      <div class="right">
        <div class="inspire-quote">
          <h2>
            "Failure is your ticket to the hard lessons that success doesn't
            teach." <span>- David Goggins</span>
          </h2>
        </div>
        <div class="fill-in-section">
          <h2>It's the Only Way</h2>
          <form>
            <div class="form-wrapper">
              <div class="row">
                <div class="field">
                  <label for="firstName">First Name</label>
                  <input type="text" name="firstName" required />
                </div>
                <div class="field">
                  <label for="lastName">Last Name</label>
                  <input type="text" name="lastName" required />
                </div>
              </div>
              <div class="row">
                <div class="field">
                  <label for="Email">Email</label>
                  <input type="email" id="email" name="email" required />
                </div>
                <div class="field">
                  <label for="phone">Phone Number</label>
                  <input
                    type="tel"
                    id="phone"
                    name="phone"
                    pattern="[0-9]{7,15}"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="field">
                  <label for="password">PassWword</label>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    required
                  />
                </div>
                <div class="field">
                  <label for="confirmPassword">Confirm Password</label>
                  <input
                    type="password"
                    name="confirmPassword"
                    id="confirmPassword"
                    required
                  />
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="create-account"></div>
      </div>
    </div>
  </body>
</html>
